name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cpack_generators: "DEB;RPM;TGZ"
            deps: "cmake build-essential rpm g++"
          - os: macos-latest
            cpack_generators: "TGZ"
            deps: "cmake"
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.deps }}
        sudo apt-get install -y libgtest-dev
    
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ${{ matrix.deps }}
        brew install googletest
    
    - name: Configure CMake
      run: |
        cmake -H. -B_build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=11
    
    - name: Build project
      run: cmake --build _build --config Release --verbose
    
    - name: Create packages
      run: |
        cd _build
        cpack -G "${{ matrix.cpack_generators }}" -C Release
        cd ..
    
    - name: List packages
      run: |
        echo "Generated packages:"
        ls -la _build/*.deb _build/*.rpm _build/*.tar.gz _build/*.dmg 2>/dev/null || true
    
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz
          _build/*.dmg
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
