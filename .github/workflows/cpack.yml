name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cpack_generators: "DEB;RPM;TGZ"
            deps: "cmake build-essential rpm"
          
          - os: macos-latest
            cpack_generators: "DragNDrop;TGZ"
            deps: "cmake"
          
          - os: windows-latest
            cpack_generators: "WIX;ZIP"
            deps: "cmake"
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.deps }}
    
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install ${{ matrix.deps }}
    
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install wixtoolset
    
    - name: Configure CMake
      run: cmake -H. -B_build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build project
      run: cmake --build _build --config Release
    
    - name: Create packages
      run: |
        cd _build
        cpack -G "${{ matrix.cpack_generators }}" -C Release
        cd ..
    
    - name: List packages
      run: |
        echo "Generated packages:"
        ls -la _build/ 2>/dev/null || true
    
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.dmg
          _build/*.msi
          _build/*.tar.gz
          _build/*.zip
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
